 <!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Mandela Favorites</title>
   <style>
      .mandela { width: 100px; height: 100px; margin: 5px; cursor: pointer; }
      .selected { border: 3px solid green; }
   </style>
</head>
<body>
<h1><img class="mandela" src="mandela_head.jpg" alt="Mandela" /> Freedom Fighter Pics!</h1>
<div id="pics">
   <img class="mandela" src="mandela1.jpg" alt="Mandela" />
   <img class="mandela" src="mandela2.jpg" alt="Mandela" />
   <img class="mandela" src="mandela3.jpg" alt="Mandela" />
   <img class="mandela" src="mandela4.jpg" alt="Mandela" />
   <img class="mandela" src="mandela5.jpg" alt="Mandela" />
   <img class="mandela" src="mandela6.jpg" alt="Mandela" />
</div>
<p>Click a picture to move it to the favorites.</p>
<fieldset id="favourites" class="mandela"><legend>Favorite photos:</legend></fieldset>
<ul id="actions"></ul>
<p id="message"></p>
<p id="counter"></p>
<script src="freedom_fighter.js"></script>
</body>
</html>
